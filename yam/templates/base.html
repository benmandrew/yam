<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Yam{% endblock %}</title>
  <!-- Root-relative, not url_for(): behind a TLS-terminating proxy (tailscale
       serve) the request scheme is http, so url_for() emits http:// asset URLs
       that a browser loading the page over https blocks as mixed content. -->
  <link rel="icon" href="/static/favicon.png" type="image/png">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">Yam</a>
    <form class="add-form" method="post" action="/api/download">
      <input type="url" name="url" placeholder="Paste a YouTube video or playlist URL…" required>
      <button type="submit">Archive</button>
    </form>
    <nav><a href="/downloads">Downloads</a> <a href="/config">Config</a></nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
