<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}YAM{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">YAM</a>
    <form class="add-form" method="post" action="/api/download">
      <input type="url" name="url" placeholder="Paste a YouTube video or playlist URL…" required>
      <button type="submit">Archive</button>
    </form>
    <nav><a href="/downloads">Downloads</a></nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
