# YAM deployment: the app joins your tailnet via a Tailscale sidecar and is
# reachable only from your own devices (no ports published to the host/LAN).
#
# Build & load the image first (on a Linux host, or a Linux remote builder):
#   nix build .#docker && docker load < result
#
# Then provide TS_AUTHKEY (see .env.example) and: docker compose up -d
# The service appears on your tailnet as http://yam.<tailnet>.ts.net:8080

services:
  tailscale:
    image: tailscale/tailscale:latest
    hostname: yam                       # -> yam.<tailnet>.ts.net
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY:?set TS_AUTHKEY in .env}
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
      # Serve the app over HTTPS on the tailnet (Funnel stays OFF).
      TS_SERVE_CONFIG: /config/serve.json
    volumes:
      - ts-state:/var/lib/tailscale
      - ./tailscale/serve.json:/config/serve.json:ro
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
    restart: unless-stopped

  yam:
    image: yam:latest                   # built via `nix build .#docker`
    network_mode: service:tailscale     # share the tailnet identity
    depends_on:
      - tailscale
    environment:
      MEDIA_DIR: /media
      DATA_DIR: /data
      MAX_CONCURRENT_DOWNLOADS: "2"
      DOWNLOAD_SUBTITLES: "false"
    volumes:
      - media:/media
      - data:/data
      # Optional: mount a cookies.txt for age-restricted/members content and
      # set COOKIES_FILE=/data/cookies.txt in this environment block.
    restart: unless-stopped

volumes:
  ts-state:
  media:
  data:
