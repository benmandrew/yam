# Yam deployment: a single container that publishes port 8080 to the host. Yam
# listens on 0.0.0.0:8080 inside the container and speaks plain HTTP — put TLS /
# access control in front of it on the host.
#
# If the host is already a tailnet node, host-level `tailscale serve` fronts it
# with HTTPS on the tailnet:
#     tailscale serve --bg --https=8449 http://127.0.0.1:8080
#     # -> https://<host>.<tailnet>.ts.net:8449
#
# Build the image first (any Docker host — see Dockerfile):
#     docker build -t yam:latest .    (or: docker compose build)

services:
  yam:
    build: .
    image: yam:latest                 # or the published image, e.g. youruser/yam:latest
    restart: unless-stopped
    environment:
      MEDIA_DIR: /media
      DATA_DIR: /data
      MAX_CONCURRENT_DOWNLOADS: "2"
      DOWNLOAD_SUBTITLES: "false"
      # Optional: mount a cookies.txt into /data and set COOKIES_FILE=/data/cookies.txt
    ports:
      # host:container. In production bind to a specific (e.g. tailnet) IP:
      #   - "100.x.y.z:8086:8080"
      - "8080:8080"
    volumes:
      - media:/media
      - data:/data

volumes:
  media:
  data:
