name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      # Runs ruff, ruff format --check, and the pytest suite (see flake checks),
      # and builds the app package.
      - name: nix flake check
        run: nix flake check -L
