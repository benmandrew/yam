# Build the Yam image and push it to Docker Hub.
#
# Works on GitHub Actions and on Gitea/Forgejo Actions (both read
# .github/workflows and share this syntax). Required repo secrets:
#   DOCKERHUB_USERNAME  - your Docker Hub username (also the image namespace)
#   DOCKERHUB_TOKEN     - a Docker Hub access token (Account Settings -> Security)
#
# On a self-hosted Gitea/Forgejo runner, adjust `runs-on` to a label your runner
# registers (e.g. `ubuntu-latest` mapped to a docker image, or your own label).
name: Publish Docker image

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/yam
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
